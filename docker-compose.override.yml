version: "3.8"

services:
  backend:
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - ENV=development
      - DEBUG=true
      - SHOW_DEBUG_INFO=true
    volumes:
      - ./backend:/app
      - ./ml:/app/ml
    user: "0:0"

  frontend:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
