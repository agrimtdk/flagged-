name: FLAGGED! Production CI/CD

on:
  push:
    branches: [ main, master, production ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies & dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff black mypy isort pytest pytest-asyncio

      - name: Code formatting check (black & isort)
        run: |
          black --check backend/ || true
          isort --check-only backend/ || true

      - name: Linting check (ruff)
        run: |
          ruff check backend/ || true

      - name: Type checking (mypy)
        run: |
          mypy --ignore-missing-imports backend/app/ || true

      - name: Run Backend Tests
        env:
          ENV: test
          POSTGRES_DB: flagged_test_db
          JWT_SECRET: testsecretkey1234567890abcdef
        run: |
          PYTHONPATH=backend pytest backend/tests/ -v

  frontend-test:
    name: Frontend Quality & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Frontend Code
        working-directory: ./frontend
        run: npm run lint || true

      - name: Build & Typecheck Frontend
        working-directory: ./frontend
        run: npm run build

  docker-build:
    name: Docker Build Validation
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: flagged/backend:test

      - name: Test Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          tags: flagged/frontend:test
