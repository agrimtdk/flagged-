version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: flagged_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-flagged_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-flagged_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - flagged_network

  redis:
    image: redis:7-alpine
    container_name: flagged_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flagged_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: flagged_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENV=${ENV:-production}
      - DEBUG=${DEBUG:-false}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-flagged_db}
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:80}
      - ML_ARTIFACT_DIR=/app/ml/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - flagged_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: flagged_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - flagged_network

volumes:
  postgres_data:
    name: flagged_postgres_data
  redis_data:
    name: flagged_redis_data

networks:
  flagged_network:
    name: flagged_network
    driver: bridge
